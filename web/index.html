<!doctype html>
<html lang="pl" class="scrollbar-slim">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kompletny dwujęzyczny (PL/EN) przewodnik po Pydantic AI - czerwiec 2026. Agenty, narzędzia, modele, structured output, MCP i więcej."
    />
    <meta name="theme-color" content="#fbf9f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#262220" media="(prefers-color-scheme: dark)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Hanken+Grotesk:wght@400..800&family=JetBrains+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <title>Pydantic AI - Przewodnik</title>

    <script>
      // Apply persisted theme before paint to avoid a flash.
      (() => {
        try {
          const stored = localStorage.getItem("pai-theme");
          const dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
