<!doctype html>
<html lang="pl" class="scrollbar-slim">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kompletny dwujęzyczny (PL/EN) przewodnik po Pydantic AI - czerwiec 2026. Agenty, narzędzia, modele, structured output, MCP i więcej."
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#262220" media="(prefers-color-scheme: dark)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400..700&family=JetBrains+Mono:wght@400..700&family=Space+Grotesk:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <title>Pydantic AI - Przewodnik</title>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pydantic AI - Przewodnik" />
    <meta name="twitter:card" content="summary_large_image" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Course",
        "name": "Pydantic AI - kompletny przewodnik / the complete guide",
        "description": "Dwujęzyczny (PL/EN) przewodnik po Pydantic AI: agenty, narzędzia, modele, MCP, testy i wdrożenia.",
        "inLanguage": ["pl", "en"],
        "provider": {
          "@type": "Person",
          "name": "SirCypkowskyy",
          "url": "https://github.com/SirCypkowskyy"
        },
        "url": "https://sircypkowskyy.github.io/pydantic-ai-custom-guide/",
        "isAccessibleForFree": true,
        "about": "Pydantic AI"
      }
    </script>

    <script>
      // Apply persisted theme before paint to avoid a flash.
      (() => {
        try {
          const stored = localStorage.getItem("pai-theme");
          const dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
